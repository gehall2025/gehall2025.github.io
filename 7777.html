<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us - Green Across Time Museum</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    font-family: "Georgia", serif;
    margin: 0;
    background: #f7f5f0;
    color: #1f2a1f;
    line-height: 1.7;
}

header {
    background: #1f3a2e;
    color: white;
    text-align: center;
    padding: 60px 20px;
}

header h1 {
    margin: 0;
    font-size: 36px;
    font-weight: normal;
}

header p {
    opacity: 0.9;
    margin-top: 10px;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

label {
    font-weight: bold;
    color: #1f3a2e;
}

input, textarea {
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-family: "Georgia", serif;
    font-size: 15px;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #1f3a2e;
}

button {
    background: #1f3a2e;
    color: white;
    border: none;
    padding: 12px;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
    font-family: "Georgia", serif;
}

button:hover {
    background: #2e4a3b;
}

.info {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #ddd;
    font-size: 15px;
}

.info h3 {
    color: #1f3a2e;
    font-weight: normal;
}

</style>
</head>

<body>

<header>
    <h1>Contact Us</h1>
    <p>Green Across Time Museum — San Francisco, California</p>
</header>

<div class="container">

    <form>
        <label>Name</label>
        <input type="text" placeholder="Your full name">

        <label>Email</label>
        <input type="email" placeholder="Your email address">

        <label>Subject</label>
        <input type="text" placeholder="Reason for contacting us">

        <label>Message</label>
        <textarea rows="6" placeholder="Write your message here..."></textarea>

        <button type="submit">Send Message</button>
    </form>

    <div class="info">
        <h3>Museum Information</h3>
        <p>
            Green Across Time Museum<br>
            2929 Geary Blvd<br>
            San Francisco, CA
        </p>

        <p>
            Email: info@greentimesmuseum.org<br>
            Phone: (000) 000-0000
        </p>
    </div>

</div>

</body>
</html>
